query {
    catalog(id: "82f0e0ad-febe-4491-964f-08ff6f9bb545") {
        id
        name
        description
        status
        createdAt
        updatedAt
        products {
            __typename
            ... on PhysicalProduct {
                id
                name
                description
                price {
                    amount
                    currency
                }
                catalog {
                    id
                    name
                }
                productType
                shippable
                sku
                status
                stockQuantity
            }
            ...on DigitalProduct{
                id
                name
                description
                price {
                    amount
                    currency
                }
                productType
                downloadUrl
                fileFormat
                fileSize
                sku
                status
            }
        }
    }
}