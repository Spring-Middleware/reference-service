version: '3.8'
name: middleware-network

services:
  mongo:
    image: mongo:6.0
    container_name: mongo
    profiles: ["infra"]
    restart: always
    ports:
      - "27018:27017" # Expose for local access if running app outside docker too
    environment:
      MONGO_INITDB_DATABASE: catalog
    volumes:
      - mongo-data:/data/db
    networks:
      - middleware-net

  redis:
    image: redis:7-alpine
    profiles: ["infra"]
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      middleware-net:
        aliases:
          - redis

  rabbitmq:
    image: rabbitmq:3.13-management
    profiles: ["infra"]
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"     # AMQP port
      - "15672:15672"   # Management UI
    volumes:
      - ./src/test/resources/definitions.json:/etc/rabbitmq/definitions.json
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit load_definitions \"/etc/rabbitmq/definitions.json\""
    restart: always
    networks:
      - middleware-net

  postgres:
    image: postgres:16
    profiles: ["infra"]
    container_name: keycloak_postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      middleware-net:
        aliases:
          - postgres


  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    profiles: ["infra"]
    container_name: keycloak
    command: start-dev --import-realm
    volumes:
      - ./docker/keycloak/export:/opt/keycloak/data/import
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      middleware-net:
        aliases:
          - keycloak


  graphql-gateway:
    image: spring-base_graphql-gateway:latest
    profiles: ["platform"]
    container_name: graphql_gateway
    hostname: graphql-gateway
    ports:
      - "8060:8080"
      - "5009:5005"
    environment:
      - JAVA_TOOL_OPTIONS=--enable-preview -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - SPRING_PROFILES_ACTIVE=LOCAL
      - REGISTRY_ENDPOINT=http://registry:8080/registry
      - GRAPHQL_ENABLED=false
      - REGISTRY_CONSISTENCY_SCHEDULER_ENABLED=false
      - LOG_API_KEY=${LOG_API_KEY}
      - JMS_PASSWORD=${JMS_PASSWORD}
      - JMS_RABBITMQ_GRAPHQL_SCANNER_CHECK_INTERVAL_MS=10000
      - JMS_RABBITMQ_GRAPHQL_SCANNER_ENABLED=true
    networks:
      middleware-net:
        aliases:
          - graphql-gateway
    depends_on:
      - registry
      - rabbitmq



  registry:
    image: spring-base_registry:latest
    profiles: ["platform"]
    container_name: registry
    hostname: registry
    ports:
      - "8040:8080"
      - "5005:5005"
    environment:
      - JAVA_TOOL_OPTIONS=--enable-preview -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - SPRING_PROFILES_ACTIVE=LOCAL
      - REGISTRY_ENDPOINT=http://registry:8080/registry
      - REDIS_ADDRESS=redis://redis:6379
      - GRAPHQL_ENABLED=false
      - REGISTRY_CONSISTENCY_SCHEDULER_ENABLED=false
      - REGISTRY_TOPOLOGY_RECONCILER_ENABLED=true
      - REGISTRY_TOPOLOGY_RECONCILER_CRON=*/5 * * * * *
      - REGISTRY_TOPOLOGY_RECONCILER_MAX_NO_AVAIL=3
      - REGISTRY_TOPOLOGY_RECONCILER_REGISTER_RESOURCE_PATH=/resources/register
      - LOG_API_KEY=${LOG_API_KEY}
      - JMS_PASSWORD=${JMS_PASSWORD}
      - JMS_RABBITMQ_REGISTRY_SCANNER_CHECK_INTERVAL_MS=10000
      - JMS_RABBITMQ_REGISTRY_CHECK_ENABLED=true
    networks:
      middleware-net:
        aliases:
          - registry
    depends_on:
      - redis
      - rabbitmq

  catalog-service:
    build:
      context: ./catalog-service
      dockerfile: Dockerfile
    image: catalog-service:latest
    profiles: ["services"]
    container_name: catalog
    hostname: catalog

    ports:
      - "8070:8080"
      - "5008:5005"
    environment:
      - JAVA_TOOL_OPTIONS=--enable-preview -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005 -Djava.net.preferIPv4Stack=true -Dio.netty.resolver.dns.ndots=1 -Dio.netty.resolver.dns.noSearchDomains=true -Dio.netty.resolver.dns.queryTimeoutMillis=10000
      - SERVER_PORT=8080
      - SECURITY_TYPE=OAUTH2
      - REGISTRY_ENDPOINT=http://registry:8080/registry
      - SERVER_CONTEXT_PATH=/catalog
      - MONGO_URI=mongodb://mongo:27017/catalog
      - REDIS_ADDRESS=redis://redis:6379
      - SPRING_PROFILES_ACTIVE=local
      - GRAPHQL_ENABLED=true
      - GRAPHQL_CATALOG_CLUSTER_NAME=catalog
      - GRAPHQL_CATALOG_NAMESPACE=catalog
      - REGISTRY_CONSISTENCY_SCHEDULER_ENABLED=true
      - REGISTRY_CONSISTENCY_SCHEDULER_CRON=*/10 * * * * *
      - LOG_API_KEY=${LOG_API_KEY}
      - LOG_REQUEST_ENABLED=true
      - LOG_RESPONSE_ENABLED=true
      - LOG_RESPONSE_TIME_ENABLED=false
      - BASIC_AUTH_CATALOG_ADMIN=admin
      - BASIC_AUTH_CATALOG_ADMIN_PASSWORD=${BASIC_AUTH_CATALOG_ADMIN_PASSWORD}
      - OAUTH2_ISSUER_URI=http://localhost:8081/realms/spring-middleware
      - OAUTH2_JWK_SET_URI=http://keycloak:8080/realms/spring-middleware/protocol/openid-connect/certs
      - OAUTH2_AUTHORITIES_CLAIM_PATH=$$.resource_access.catalog-service.roles[*]
      - API_KEY_PRODUCT_SERVICE=${API_KEY_PRODUCT_ADMIN}
      - API_KEY_CATALOG_SERVICE=${API_KEY_CATALOG_SERVICE}
      - OAUTH2_CLIENT_SECRET_PRODUCT_SERVICE=${OAUTH2_CLIENT_SECRET_PRODUCT_SERVICE}
      - JMS_PASSWORD=${JMS_PASSWORD}
      - JMS_RABBITMQ_REGISTRY_SCANNER_ENABLED=true
      - JMS_RABBITMQ_REGISTRY_SCANNER_CHECK_INTERVAL=10000
      - KAFKA_BOOTSTRAP_SERVERS=kafka-1:9092,kafka-2:9092,kafka-3:9092
    depends_on:
      - mongo
    networks:
      - middleware-net

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    image: product-service:latest
    profiles: ["services"]
    container_name: product
    hostname: product
    ports:
      - "8090:8080"
      - "5007:5007"
    environment:
      - JAVA_TOOL_OPTIONS=--enable-preview -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5007 -Djava.net.preferIPv4Stack=true -Dio.netty.resolver.dns.ndots=1 -Dio.netty.resolver.dns.noSearchDomains=true -Dio.netty.resolver.dns.queryTimeoutMillis=10000
      - SERVER_PORT=8080
      - SECURITY_TYPE=OAUTH2
      - SERVER_CONTEXT_PATH=/product
      - REGISTRY_ENDPOINT=http://registry:8080/registry
      - MONGO_URI=mongodb://mongo:27017/product
      - GRAPHQL_ENABLED=true
      - GRAPHQL_PRODUCT_CLUSTER_NAME=product
      - GRAPHQL_PRODUCT_NAMESPACE=product
      - SPRING_PROFILES_ACTIVE=local
      - REGISTRY_CONSISTENCY_SCHEDULER_ENABLED=true
      - REGISTRY_CONSISTENCY_SCHEDULER_CRON=*/10 * * * * *
      - LOG_API_KEY=${LOG_API_KEY}
      - LOG_REQUEST_ENABLED=true
      - LOG_RESPONSE_ENABLED=true
      - LOG_RESPONSE_TIME_ENABLED=false
      - JMS_PASSWORD=${JMS_PASSWORD}
      - OAUTH2_ISSUER_URI=http://keycloak:8080/realms/spring-middleware
      - OAUTH2_JWK_SET_URI=http://keycloak:8080/realms/spring-middleware/protocol/openid-connect/certs
      - OAUTH2_AUTHORITIES_CLAIM_PATH=$$.resource_access.product-service.roles[*]
      - API_KEY_PRODUCT_ADMIN=${API_KEY_PRODUCT_ADMIN}
      - API_KEY_PRODUCT_WRITER=${API_KEY_PRODUCT_WRITER}
      - API_KEY_PRODUCT_READER=${API_KEY_PRODUCT_READER}
      - OAUTH2_TOKEN_URI_PRODUCT_SERVICE=http://keycloak:8080/realms/spring-middleware/protocol/openid-connect/token
      - BASIC_AUTH_PRODUCT_ADMIN_PASSWORD=${BASIC_AUTH_PRODUCT_ADMIN_PASSWORD}
      - OAUTH2_CLIENT_ID_CATALOG_SERVICE=catalog-service
      - OAUTH2_CLIENT_SECRET_CATALOG_SERVICE=${OAUTH2_CLIENT_SECRET_CATALOG_SERVICE}
      - JMS_RABBITMQ_REGISTRY_SCANNER_ENABLED=true
      - JMS_RABBITMQ_REGISTRY_SCANNER_CHECK_INTERVAL=10000
    depends_on:
      - mongo
    networks:
      middleware-net:
        aliases:
          - product


  nginx:
    image: nginx:latest
    profiles: ["product-cluster"]
    hostname: product
    ports:
      - "8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - product-service-1
      - product-service-2
      - product-service-3
    networks:
      middleware-net:
        aliases:
          - product

  product-service-1:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    image: product-service:latest
    profiles: ["product-node"]
    hostname: product-1
    expose:
      - "8080"
      - "5005"
    environment:
      - JAVA_TOOL_OPTIONS=--enable-preview -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5007 -Djava.net.preferIPv4Stack=true -Dio.netty.resolver.dns.ndots=1 -Dio.netty.resolver.dns.noSearchDomains=true -Dio.netty.resolver.dns.queryTimeoutMillis=10000
      - SERVER_PORT=8080
      - SERVER_CONTEXT_PATH=/product
      - SECURITY_TYPE=BASIC_AUTH
      - REGISTRY_ENDPOINT=http://registry:8080/registry
      - MONGO_URI=mongodb://mongo:27017/product
      - GRAPHQL_ENABLED=true
      - GRAPHQL_PRODUCT_CLUSTER_NAME=product
      - GRAPHQL_PRODUCT_NAMESPACE=product
      - SPRING_PROFILES_ACTIVE=local
      - REGISTRY_CONSISTENCY_SCHEDULER_ENABLED=true
      - REGISTRY_CONSISTENCY_SCHEDULER_CRON=*/10 * * * * *
      - LOG_API_KEY=${LOG_API_KEY}
      - LOG_REQUEST_ENABLED=true
      - LOG_RESPONSE_ENABLED=true
      - LOG_RESPONSE_TIME_ENABLED=false
      - JMS_PASSWORD=${JMS_PASSWORD}
      - OAUTH2_ISSUER_URI=http://keycloak:8080/realms/spring-middleware
      - OAUTH2_JWK_SET_URI=http://keycloak:8080/realms/spring-middleware/protocol/openid-connect/certs
      - OAUTH2_AUTHORITIES_CLAIM_PATH=$$.resource_access.product-service.roles[*]
      - API_KEY_PRODUCT_ADMIN=${API_KEY_PRODUCT_ADMIN}
      - API_KEY_PRODUCT_WRITER=${API_KEY_PRODUCT_WRITER}
      - API_KEY_PRODUCT_READER=${API_KEY_PRODUCT_READER}
      - OAUTH2_TOKEN_URI_PRODUCT_SERVICE=http://keycloak:8080/realms/spring-middleware/protocol/openid-connect/token
      - BASIC_AUTH_PRODUCT_ADMIN_PASSWORD=${BASIC_AUTH_PRODUCT_ADMIN_PASSWORD}
      - JMS_RABBITMQ_REGISTRY_SCANNER_ENABLED=true
      - JMS_RABBITMQ_REGISTRY_SCANNER_CHECK_INTERVAL=10000
    depends_on:
      - mongo
    networks:
      - middleware-net

  product-service-2:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    image: product-service:latest
    profiles: ["product-node"]
    hostname: product-2
    expose:
      - "8080"
      - "5005"
    environment:
      - JAVA_TOOL_OPTIONS=--enable-preview -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5007 -Djava.net.preferIPv4Stack=true -Dio.netty.resolver.dns.ndots=1 -Dio.netty.resolver.dns.noSearchDomains=true -Dio.netty.resolver.dns.queryTimeoutMillis=10000
      - SERVER_PORT=8080
      - SERVER_CONTEXT_PATH=/product
      - SECURITY_TYPE=BASIC_AUTH
      - REGISTRY_ENDPOINT=http://registry:8080/registry
      - MONGO_URI=mongodb://mongo:27017/product
      - GRAPHQL_ENABLED=true
      - GRAPHQL_PRODUCT_CLUSTER_NAME=product
      - GRAPHQL_PRODUCT_NAMESPACE=product
      - SPRING_PROFILES_ACTIVE=local
      - REGISTRY_CONSISTENCY_SCHEDULER_ENABLED=true
      - REGISTRY_CONSISTENCY_SCHEDULER_CRON=*/10 * * * * *
      - LOG_API_KEY=${LOG_API_KEY}
      - LOG_REQUEST_ENABLED=true
      - LOG_RESPONSE_ENABLED=true
      - LOG_RESPONSE_TIME_ENABLED=false
      - JMS_PASSWORD=${JMS_PASSWORD}
      - OAUTH2_ISSUER_URI=http://keycloak:8080/realms/spring-middleware
      - OAUTH2_JWK_SET_URI=http://keycloak:8080/realms/spring-middleware/protocol/openid-connect/certs
      - OAUTH2_AUTHORITIES_CLAIM_PATH=$$.resource_access.product-service.roles[*]
      - API_KEY_PRODUCT_ADMIN=${API_KEY_PRODUCT_ADMIN}
      - API_KEY_PRODUCT_WRITER=${API_KEY_PRODUCT_WRITER}
      - API_KEY_PRODUCT_READER=${API_KEY_PRODUCT_READER}
      - OAUTH2_TOKEN_URI_PRODUCT_SERVICE=http://keycloak:8080/realms/spring-middleware/protocol/openid-connect/token
      - BASIC_AUTH_PRODUCT_ADMIN_PASSWORD=${BASIC_AUTH_PRODUCT_ADMIN_PASSWORD}
      - JMS_RABBITMQ_REGISTRY_SCANNER_ENABLED=true
      - JMS_RABBITMQ_REGISTRY_SCANNER_CHECK_INTERVAL=10000
    depends_on:
      - mongo
    networks:
      - middleware-net

  product-service-3:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    image: product-service:latest
    profiles: ["product-node"]
    hostname: product-3
    expose:
      - "8080"
      - "5005"
    environment:
      - JAVA_TOOL_OPTIONS=--enable-preview -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5007 -Djava.net.preferIPv4Stack=true -Dio.netty.resolver.dns.ndots=1 -Dio.netty.resolver.dns.noSearchDomains=true -Dio.netty.resolver.dns.queryTimeoutMillis=10000
      - SERVER_PORT=8080
      - SERVER_CONTEXT_PATH=/product
      - SECURITY_TYPE=BASIC_AUTH
      - REGISTRY_ENDPOINT=http://registry:8080/registry
      - MONGO_URI=mongodb://mongo:27017/product
      - GRAPHQL_ENABLED=true
      - GRAPHQL_PRODUCT_CLUSTER_NAME=product
      - GRAPHQL_PRODUCT_NAMESPACE=product
      - SPRING_PROFILES_ACTIVE=local
      - REGISTRY_CONSISTENCY_SCHEDULER_ENABLED=true
      - REGISTRY_CONSISTENCY_SCHEDULER_CRON=*/10 * * * * *
      - LOG_API_KEY=${LOG_API_KEY}
      - LOG_REQUEST_ENABLED=true
      - LOG_RESPONSE_ENABLED=true
      - LOG_RESPONSE_TIME_ENABLED=false
      - JMS_PASSWORD=${JMS_PASSWORD}
      - OAUTH2_ISSUER_URI=http://keycloak:8080/realms/spring-middleware
      - OAUTH2_JWK_SET_URI=http://keycloak:8080/realms/spring-middleware/protocol/openid-connect/certs
      - OAUTH2_AUTHORITIES_CLAIM_PATH=$$.resource_access.product-service.roles[*]
      - API_KEY_PRODUCT_ADMIN=${API_KEY_PRODUCT_ADMIN}
      - API_KEY_PRODUCT_WRITER=${API_KEY_PRODUCT_WRITER}
      - API_KEY_PRODUCT_READER=${API_KEY_PRODUCT_READER}
      - OAUTH2_TOKEN_URI_PRODUCT_SERVICE=http://keycloak:8080/realms/spring-middleware/protocol/openid-connect/token
      - BASIC_AUTH_PRODUCT_ADMIN_PASSWORD=${BASIC_AUTH_PRODUCT_ADMIN_PASSWORD}
      - JMS_RABBITMQ_REGISTRY_SCANNER_ENABLED=true
      - JMS_RABBITMQ_REGISTRY_SCANNER_CHECK_INTERVAL=10000
    depends_on:
      - mongo
    networks:
      - middleware-net

  wiremock:
    image: wiremock/wiremock:latest
    profiles: ["testing"]
    container_name: product
    hostname: product
    ports:
      - "8089:8080"
    volumes:
      - ./wiremock:/home/wiremock
    networks:
      middleware-net:
        aliases:
          - product

networks:
  middleware-net:
    driver: bridge
    name: middleware-net

volumes:
  mongo-data:
  keycloak_postgres_data:


