query {
    catalogWithProducts(id: "c116f9df-203e-402a-9fe0-1d9a095d3cf5") {
        id
        name
        status
        createdAt
        updatedAt
        products {
            __typename
            ... on DigitalProduct {
                id
                name
                description
                productType
                price {
                    amount
                    currency
                }
                fileFormat
                status
                createdAt
                updatedAt
                fileSize
                downloadUrl
            }
            ... on PhysicalProduct {
                id
                name
                description
                productType
                price {
                    amount
                    currency
                }
                status
                createdAt
                updatedAt
                dimensions {
                    length
                    width
                    height
                }
                stockQuantity

            }
        }
    }
}