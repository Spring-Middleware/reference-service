# Product Service Configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/product}

spring:
  application:
    name: product-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://127.0.0.1:27017/product}
      auto-index-creation: true
      uuid-representation: standard

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    io.github.spring.middleware: ${LOG_LEVEL_PACKAGE:DEBUG}
    org.springframework.security: TRACE
    org.springframework.security.web: TRACE
    root: ${LOG_LEVEL_ROOT:ERROR}
  exclude:
    urlPatterns:
      - /api-docs
      - /swagger-ui.html
      - /swagger-ui/**

middleware:

  log:
    apiKey: ${LOG_API_KEY}
    request:
      enabled: ${LOG_REQUEST_ENABLED:true}
    response:
      enabled: ${LOG_RESPONSE_ENABLED:true}
    responseTime:
      enabled: ${LOG_RESPONSE_TIME_ENABLED:false}
    exclude:
      urlPatterns:
        - /api-docs/**
        - /swagger-ui.html
        - /swagger-ui/**

  security:
    type: ${SECURITY_TYPE:OIDC} #options: NONE, BASIC_AUTH, JWT, OIDC, API_KEY

    public-paths:
      - /api-docs/**
      - /swagger-ui.html
      - /swagger-ui/**

    protected-paths:
      - type: ROLES
        path: /api/v1/products/bulk
        methods: [ POST, PUT, DELETE ]
        allowed-roles: [ ADMIN , PRODUCT_WRITER ]

      - type: ROLES
        path: /api/v1/products
        methods: [ GET ]
        allowed-roles: [ ADMIN, PRODUCT_WRITER, PRODUCT_READER ]

      - type: ROLES
        path: /api/*/products/*
        methods: [ PUT, DELETE, PATCH ]
        allowed-roles: [ ADMIN, PRODUCT_WRITER ]

      - type: ROLES
        path: /api/*/products/*
        methods: [ GET ]
        allowed-roles: [ ADMIN, PRODUCT_WRITER, PRODUCT_READER ]

      - type: ROLES
        path: /api/*/products
        methods: [ POST ]
        allowed-roles: [ ADMIN, PRODUCT_WRITER ]

    api-key:
      header-name: ${API_KEY_HEADER_NAME:X-API-KEY}
      credentials:
        - key: ${API_KEY_PRODUCT_ADMIN:default-api-key}
          enabled: true
          roles: [ ADMIN ]
        - key: ${API_KEY_PRODUCT_WRITER:product-writer-key}
          enabled: true
          roles: [ PRODUCT_WRITER ]
        - key: ${API_KEY_PRODUCT_READER:product-reader-key}
          enabled: true
          roles: [ PRODUCT_READER ]

    oidc:
      issuer-uri: ${OIDC_ISSUER_URI}
      jwk-set-uri: ${OIDC_JWK_SET_URI:http://keycloak:8080/realms/spring-middleware/protocol/openid-connect/certs}
      authorities-claim-path: ${OIDC_AUTHORITIES_CLAIM_PATH:$.resource_access.product-service.roles[*]}

  client:
    registry-endpoint: ${REGISTRY_ENDPOINT:http://localhost:8080/registry}

  jms:
    profile: ${JMS_PROFILE:LOCAL}
    host: ${JMS_HOST:amqp://rabbitmq:5672}
    user: ${JMS_USER:admin}
    password: ${JMS_PASSWORD:admin}
    max-pool-size: ${JMS_MAX_POOL_SIZE:10}
    min-idle: ${JMS_MIN_IDLE:5}
    max-idle: ${JMS_MAX_IDLE:10}
    rabbitmq:
      base-url: ${JMS_RABBITMQ_BASE_URL:http://rabbitmq:15672}

  resource-register:
    cluster-name: ${RESOURCE_CLUSTER_NAME:product}

  public-server:
    # In Docker the public hostname will be the service name `registry` (or set via env)
    host: ${PUBLIC_SERVER_HOST:localhost}
    port: ${PUBLIC_SERVER_PORT:8080}

  graphql:
    enabled: ${GRAPHQL_ENABLED:false}
    clusterName: ${GRAPHQL_CLUSTER_NAME:product}
    namespace: ${GRAPHQL_NAMESPACE:product}

  registry-consistency-scheduler:
    enabled: ${REGISTRY_CONSISTENCY_SCHEDULER_ENABLED:true}
    cron: ${REGISTRY_CONSISTENCY_SCHEDULER_CRON:*/30 * * * * *}

redisson:
  # In Docker compose Redis service should be named `redis`
  address: ${REDIS_ADDRESS:redis://localhost:6379}
  database: ${REDIS_DATABASE:0}

