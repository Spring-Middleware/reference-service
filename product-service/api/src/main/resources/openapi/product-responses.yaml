components:
  responses:
    Error400:
      description: Bad Request
      content:
        application/json:
          schema: { $ref: "product-schema.yaml#/components/schemas/ErrorMessage" }
    Error401:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: "product-schema.yaml#/components/schemas/ErrorMessage" }
    Error403:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: "product-schema.yaml#/components/schemas/ErrorMessage" }
    Error404:
      description: Not Found
      content:
        application/json:
          schema: { $ref: "product-schema.yaml#/components/schemas/ErrorMessage" }
    Error409:
      description: Conflict
      content:
        application/json:
          schema: { $ref: "product-schema.yaml#/components/schemas/ErrorMessage" }
    Error500:
      description: Internal Server Error
      content:
        application/json:
          schema: { $ref: "product-schema.yaml#/components/schemas/ErrorMessage" }

    ProductResponse:
      description: Product
      content:
        application/json:
          schema:
            $ref: "product-schema.yaml#/components/schemas/Product"

    ProductListResponse:
      description: List of Products
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "product-schema.yaml#/components/schemas/Product"

  schemas:
    PagedProductResponse:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items: { $ref: "product-schema.yaml#/components/schemas/Product" }
        page: { type: integer, example: 0 }
        size: { type: integer, example: 20 }
        totalItems: { type: integer, example: 123 }
        totalPages: { type: integer, example: 7 }
      required: [items, page, size, totalItems, totalPages]
