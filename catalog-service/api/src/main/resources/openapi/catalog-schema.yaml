components:
  schemas:
    CatalogStatus:
      type: string
      enum: [ ACTIVE, INACTIVE ]
      example: ACTIVE

    ProductStatus:
      type: string
      enum: [ ACTIVE, INACTIVE, DISCONTINUED ]
      example: ACTIVE

    Money:
      type: object
      additionalProperties: false
      properties:
        amount:
          type: number
          format: double
          example: 19.99
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: EUR
      required: [ amount, currency ]

    CatalogBase:
      type: object
      additionalProperties: false
      properties:
        id: { type: string, format: uuid, example: "123e4567-e89b-12d3-a456-426614174000" }
        name: { type: string, example: "Summer 2026" }
        status: { $ref: "#/components/schemas/CatalogStatus" }
        createdAt:
          type: string
          format: date-time
          example: "2026-03-02T12:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-03-02T12:30:00Z"
      required: [ id, name, status, createdAt, updatedAt ]

    Catalog:
      allOf:
        - $ref: "#/components/schemas/CatalogBase"
        - type: object
          properties:
            productIds:
              type: array
              description: Product identifiers contained in this catalog.
              items: { type: string }
              example: [ "123e4567-e89b-12d3-a456-426614174001", "123e4567-e89b-12d3-a456-426614174002" ]
          required: [ productIds ]

    CatalogWithProducts:
      allOf:
        - $ref: "#/components/schemas/CatalogBase"
        - type: object
          properties:
            products:
              type: array
              description: Present only when `expand=products`.
              items:
                $ref: "#/components/schemas/ProductSummary"
              nullable: true

    ProductSummary:
      type: object
      additionalProperties: false
      description: Minimal product representation returned by catalog-service when expanded.
      properties:
        id: { type: string, format: uuid, example: "123e4567-e89b-12d3-a456-426614174001" }
        sku: { type: string, example: "TSHIRT-BLUE-M" }
        name: { type: string, example: "T-Shirt Blue" }
        status: { $ref: "#/components/schemas/ProductStatus" }
        price: { $ref: "#/components/schemas/Money" }
      required: [ id, name, status, price ]

    ErrorMessage:
      type: object
      additionalProperties: false
      properties:
        statusCode:
          type: integer
          format: int32
          example: 500
        statusMessage:
          type: string
          example: "Internal Server Error"
        errorCode:
          type: string
          nullable: true
          example: "FRAMEWORK:UNKNOWN_ERROR"
        errorMessage:
          type: string
          nullable: true
          example: "An unknown error occurred"
        extensions:
          type: object
          nullable: true
          additionalProperties: true
      required: [statusCode, statusMessage]

    ProductType:
      type: string
      enum: [ PHYSICAL, DIGITAL ]
      example: PHYSICAL

    Dimensions:
      type: object
      additionalProperties: false
      properties:
        length:
          type: number
          format: double
          example: 30.0
        width:
          type: number
          format: double
          example: 20.0
        height:
          type: number
          format: double
          example: 10.0
      required: [ length, width, height ]

    BaseProductInput:
      type: object
      additionalProperties: false
      properties:
        sku: { type: string, example: "TSHIRT-BLUE-M" }
        name: { type: string, example: "T-Shirt Blue" }
        status: { $ref: "#/components/schemas/ProductStatus" }
        price: { $ref: "#/components/schemas/Money" }
        productType: "#/components/schemas/ProductType"
      required: [ name, price ]

    BaseProductWithIdInput:
      type: object
      additionalProperties: false
      properties:
        id: { type: string, format: uuid, example: "123e4567-e89b-12d3-a456-426614174001" }
        sku: { type: string, example: "TSHIRT-BLUE-M" }
        name: { type: string, example: "T-Shirt Blue" }
        status: { $ref: "#/components/schemas/ProductStatus" }
        price: { $ref: "#/components/schemas/Money" }
        productType: "#/components/schemas/ProdcutType"
      required: [ id, name, price ]

    PhysicalProductInput:
      x-discriminator-value: PHYSICAL
      allOf:
        - $ref: "#/components/schemas/BaseProductInput"
        - type: object
          properties:
            dimensions:
              $ref: "#/components/schemas/Dimensions"
            stockQuantity:
              type: integer
              format: int32
            shippable:
              type: boolean
          required: []

    PhysicalProductWithIdInput:
      x-discriminator-value: PHYSICAL
      allOf:
        - $ref: "#/components/schemas/BaseProductWithIdInput"
        - type: object
          properties:
            dimensions:
              $ref: "#/components/schemas/Dimensions"
            stockQuantity:
              type: integer
              format: int32
            shippable:
              type: boolean
          required: []

    DigitalProductInput:
      x-discriminator-value: DIGITAL
      allOf:
        - $ref: "#/components/schemas/BaseProductInput"
        - type: object
          properties:
            fileSize:
              type: integer
              format: int64
            fileFormat:
              type: string
            downloadUrl:
              type: string
              format: uri
              example: "https://example.com/downloads/digital-product-123.zip"
          required: []

    DigitalProductWithIdInput:
      x-discriminator-value: DIGITAL
      allOf:
          - $ref: "#/components/schemas/BaseProductWithIdInput"
          - type: object
            properties:
                fileSize:
                  type: integer
                  format: int64
                fileFormat:
                  type: string
                downloadUrl:
                  type: string
                  format: uri
                example: "https://example.com/downloads/digital-product-123.zip"
            required: []

    ProductInput:
      type: object
      additionalProperties: false
      properties:
        productType: { $ref: "#/components/schemas/ProductType" }
      oneOf:
          - $ref: "#/components/schemas/PhysicalProductInput"
          - $ref: "#/components/schemas/DigitalProductInput"
      required: [ productType ]
      discriminator:
        propertyName: productType
        mapping:
          PHYSICAL: "#/components/schemas/PhysicalProductInput"
          DIGITAL: "#/components/schemas/DigitalProductInput"

    ProductWithIdInput:
      type: object
      additionalProperties: false
      oneOf:
        - $ref: "#/components/schemas/PhysicalProductWithIdInput"
        - $ref: "#/components/schemas/DigitalProductWithIdInput"
      properties:
        productType: { $ref: "#/components/schemas/ProductType" }
      required: [ id, productType ]
      discriminator:
        propertyName: productType
        mapping:
          PHYSICAL: "#/components/schemas/PhysicalProductWithIdInput"
          DIGITAL: "#/components/schemas/DigitalProductWithIdInput"

    PagedCatalogResponse:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Catalog"
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalItems:
          type: integer
          example: 123
        totalPages:
          type: integer
          example: 7
      required: [ items, page, size, totalItems, totalPages ]

    PagedProductResponse:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ProductWithIdInput" }
        page: { type: integer, example: 0 }
        size: { type: integer, example: 20 }
        totalItems: { type: integer, example: 123 }
        totalPages: { type: integer, example: 7 }
      required: [ items, page, size, totalItems, totalPages ]
