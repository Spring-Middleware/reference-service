components:
  schemas:
    ProductStatus:
      type: string
      enum: [ACTIVE, INACTIVE, DISCONTINUED]
      example: ACTIVE

    Money:
      type: object
      additionalProperties: false
      properties:
        amount:
          type: number
          format: double
          example: 19.99
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: EUR
      required: [amount, currency]

    Product:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        catalogId:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        sku:
          type: string
          example: "TSHIRT-BLUE-M"
        name:
          type: string
          example: "T-Shirt Blue (M)"
        description:
          type: string
          nullable: true
          example: "100% cotton"
        status:
          $ref: "#/components/schemas/ProductStatus"
        price:
          $ref: "#/components/schemas/Money"
        createdAt:
          type: string
          format: date-time
          example: "2026-03-02T12:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-03-02T12:30:00Z"
      required: [id, catalogId, sku, name, status, price, createdAt, updatedAt]


    ErrorMessage:
      type: object
      additionalProperties: false
      properties:
        statusCode:
          type: integer
          format: int32
          example: 500
        statusMessage:
          type: string
          example: "Internal Server Error"
        errorCode:
          type: string
          nullable: true
          example: "FRAMEWORK:UNKNOWN_ERROR"
        errorMessage:
          type: string
          nullable: true
          example: "An unknown error occurred"
        extensions:
          type: object
          nullable: true
          additionalProperties: true
      required: [statusCode, statusMessage]

