            fileFormat:
              type: string
            downloadUrl:
              type: string
              format: uri

    ProductReplaceItem:
      oneOf:
        - $ref: "#/components/schemas/PhysicalProductReplaceItem"
        - $ref: "#/components/schemas/DigitalProductReplaceItem"
      properties:
        productType:
          $ref: "product-schema.yaml#/components/schemas/ProductType"
      discriminator:
        propertyName: productType
        mapping:
          PHYSICAL: "#/components/schemas/PhysicalProductReplaceItem"
          DIGITAL: "#/components/schemas/DigitalProductReplaceItem"

    ProductBulkReplaceRequest:
      type: object
      additionalProperties: false
      properties:
        catalogId:
          type: string
          format: uuid
        items:
