components:
  schemas:
    CatalogStatus:
      type: string
      enum: [ ACTIVE, INACTIVE ]
      example: ACTIVE

    ProductStatus:
      type: string
      enum: [ ACTIVE, INACTIVE, DISCONTINUED ]
      example: ACTIVE

    Money:
      type: object
      additionalProperties: false
      properties:
        amount:
          type: number
          format: double
          example: 19.99
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: EUR
      required: [ amount, currency ]

    CatalogBase:
      type: object
      additionalProperties: false
      properties:
        id: { type: string, format: uuid, example: "123e4567-e89b-12d3-a456-426614174000" }
        name: { type: string, example: "Summer 2026" }
        status: { $ref: "#/components/schemas/CatalogStatus" }
        createdAt:
          type: string
          format: date-time
          example: "2026-03-02T12:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-03-02T12:30:00Z"
      required: [ id, name, status, createdAt, updatedAt ]

    Catalog:
      allOf:
        - $ref: "#/components/schemas/CatalogBase"
        - type: object
          properties:
            productIds:
              type: array
              description: Product identifiers contained in this catalog.
              items: { type: string }
              example: [ "123e4567-e89b-12d3-a456-426614174001", "123e4567-e89b-12d3-a456-426614174002" ]
          required: [ productIds ]

    CatalogWithProducts:
      allOf:
        - $ref: "#/components/schemas/CatalogBase"
        - type: object
          properties:
            products:
              type: array
              description: Present only when `expand=products`.
              items:
                $ref: "#/components/schemas/ProductSummary"
              nullable: true

    ProductSummary:
      type: object
      additionalProperties: false
      description: Minimal product representation returned by catalog-service when expanded.
      properties:
        id: { type: string, format: uuid, example: "123e4567-e89b-12d3-a456-426614174001" }
        sku: { type: string, example: "TSHIRT-BLUE-M" }
        name: { type: string, example: "T-Shirt Blue" }
        status: { $ref: "#/components/schemas/ProductStatus" }
        price: { $ref: "#/components/schemas/Money" }
      required: [ id, name, status, price ]

    ErrorMessage:
      type: object
      additionalProperties: false
      properties:
        statusCode:
          type: integer
          format: int32
          example: 500
        statusMessage:
          type: string
          example: "Internal Server Error"
        errorCode:
          type: string
          nullable: true
          example: "FRAMEWORK:UNKNOWN_ERROR"
        errorMessage:
          type: string
          nullable: true
          example: "An unknown error occurred"
        extensions:
          type: object
          nullable: true
          additionalProperties: true
      required: [statusCode, statusMessage]

    ProductInput:
      type: object
      additionalProperties: false
      properties:
        sku: { type: string, example: "TSHIRT-BLUE-M" }
        name: { type: string, example: "T-Shirt Blue" }
        status: { $ref: "#/components/schemas/ProductStatus" }
        price: { $ref: "#/components/schemas/Money" }
      required: [ name, sku, price ]

    ProductWithIdInput:
      type: object
      additionalProperties: false
      properties:
        id: { type: string, format: uuid, example: "123e4567-e89b-12d3-a456-426614174001" }
        sku: { type: string, example: "TSHIRT-BLUE-M" }
        name: { type: string, example: "T-Shirt Blue" }
        status: { $ref: "#/components/schemas/ProductStatus" }
        price: { $ref: "#/components/schemas/Money" }
      required: [ id, name, sku, price ]

    PagedCatalogResponse:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Catalog"
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalItems:
          type: integer
          example: 123
        totalPages:
          type: integer
          example: 7
      required: [ items, page, size, totalItems, totalPages ]

    PagedProductResponse:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ProductSummary" }
        page: { type: integer, example: 0 }
        size: { type: integer, example: 20 }
        totalItems: { type: integer, example: 123 }
        totalPages: { type: integer, example: 7 }
      required: [ items, page, size, totalItems, totalPages ]
