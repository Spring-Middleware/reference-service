          DIGITAL: "#/components/schemas/DigitalProductCreateItem"

    ProductBulkCreateRequest:
      type: object
      additionalProperties: false
      properties:
        catalogId:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProductCreateItem"
          minItems: 1
          maxItems: 1000
      required: [catalogId, items]

    # --- BULK DELETE ---
    ProductBulkDeleteRequest:
      type: object
      additionalProperties: false
      properties:
        catalogId:
          type: string
          format: uuid
        productIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
          maxItems: 1000
      required: [catalogId, productIds]

    # --- BULK REPLACE ---
    BaseProductReplaceItem:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        sku:
          type: string
