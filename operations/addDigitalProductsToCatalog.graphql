mutation {
    addDigitalProductsToCatalog(catalogId: "c116f9df-203e-402a-9fe0-1d9a095d3cf5", inputs: [
        {
            name: "Product 1",
            description: "Description for Product 1",
            priceAmount: 19.99,
            priceCurrency: "USD",
            sku: "PROD-011",
            status: ACTIVE
            fileFormat: "pdf",
            fileSize: 1024,
            downloadUrl: "https://example.com/download/product1.pdf"
        },{
            name: "Product 2",
            description: "Description for Product 2",
            priceAmount: 29.99,
            priceCurrency: "USD",
            sku: "PROD-012",
            status: ACTIVE
            fileFormat: "epub",
            fileSize: 2048,
            downloadUrl: "https://example.com/download/product2.epub"
        }
    ]) {
        id
        name
        status
        createdAt
        updatedAt
        products {
            __typename
            ... on DigitalProduct {
                id
                name
                description
                price {
                    amount
                    currency
                }
                sku
                status
                fileFormat
                fileSize
                downloadUrl
            }
        }

    }
}

