components:
  schemas:
    # --- CREATE ---
    BaseProductCreateRequest:
      type: object
      additionalProperties: false
      properties:
        catalogId:
          type: string
          format: uuid
        sku:
          type: string
          minLength: 1
          maxLength: 80
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true
          maxLength: 2000
        status:
          $ref: "product-schema.yaml#/components/schemas/ProductStatus"
        price:
          $ref: "product-schema.yaml#/components/schemas/Money"
        productType:
          $ref: "product-schema.yaml#/components/schemas/ProductType"
      required: [catalogId, sku, name, status, price, productType]

    PhysicalProductCreateRequest:
      x-discriminator-value: PHYSICAL
      allOf:
        - $ref: "#/components/schemas/BaseProductCreateRequest"
        - type: object
          properties:
            dimensions:
              $ref: "product-schema.yaml#/components/schemas/Dimensions"
            stockQuantity:
              type: integer
              format: int32
            shippable:
              type: boolean

    DigitalProductCreateRequest:
      x-discriminator-value: DIGITAL
      allOf:
        - $ref: "#/components/schemas/BaseProductCreateRequest"
        - type: object
          properties:
            fileSize:
              type: integer
              format: int64
            fileFormat:
              type: string
            downloadUrl:
              type: string
              format: uri

    ProductCreateRequest:
      oneOf:
        - $ref: "#/components/schemas/PhysicalProductCreateRequest"
        - $ref: "#/components/schemas/DigitalProductCreateRequest"
      properties:
        productType:
          $ref: "product-schema.yaml#/components/schemas/ProductType"
      discriminator:
        propertyName: productType
        mapping:
          PHYSICAL: "#/components/schemas/PhysicalProductCreateRequest"
          DIGITAL: "#/components/schemas/DigitalProductCreateRequest"

    # --- UPDATE (PUT) ---
    BaseProductUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        sku:
          type: string
          minLength: 1
          maxLength: 80
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true
          maxLength: 2000
        status:
          $ref: "product-schema.yaml#/components/schemas/ProductStatus"
        price:
          $ref: "product-schema.yaml#/components/schemas/Money"
        productType:
          $ref: "product-schema.yaml#/components/schemas/ProductType"
        reviewIds:
          type: array
          items:
            type: string
            format: uuid
      required: [sku, name, status, price, productType]

    PhysicalProductUpdateRequest:
      x-discriminator-value: PHYSICAL
      allOf:
        - $ref: "#/components/schemas/BaseProductUpdateRequest"
        - type: object
          properties:
            dimensions:
              $ref: "product-schema.yaml#/components/schemas/Dimensions"
            stockQuantity:
              type: integer
              format: int32
            shippable:
              type: boolean

    DigitalProductUpdateRequest:
      x-discriminator-value: DIGITAL
      allOf:
        - $ref: "#/components/schemas/BaseProductUpdateRequest"
        - type: object
          properties:
            fileSize:
              type: integer
              format: int64
            fileFormat:
              type: string
            downloadUrl:
              type: string
              format: uri

    ProductUpdateRequest:
      oneOf:
        - $ref: "#/components/schemas/PhysicalProductUpdateRequest"
        - $ref: "#/components/schemas/DigitalProductUpdateRequest"
      properties:
        productType:
          $ref: "product-schema.yaml#/components/schemas/ProductType"
      discriminator:
        propertyName: productType
        mapping:
          PHYSICAL: "#/components/schemas/PhysicalProductUpdateRequest"
          DIGITAL: "#/components/schemas/DigitalProductUpdateRequest"

    # --- PATCH ---
    BaseProductPatchRequest:
      type: object
      additionalProperties: false
      description: Only provided fields will be updated.
      properties:
        sku:
          type: string
          nullable: true
          minLength: 1
          maxLength: 80
        name:
          type: string
          nullable: true
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true
          maxLength: 2000
        status:
          $ref: "product-schema.yaml#/components/schemas/ProductStatus"
        price:
          $ref: "product-schema.yaml#/components/schemas/Money"
        productType:
          $ref: "product-schema.yaml#/components/schemas/ProductType"
        reviewIds:
          type: array
          items:
            type: string
            format: uuid

    PhysicalProductPatchRequest:
      x-discriminator-value: PHYSICAL
      allOf:
        - $ref: "#/components/schemas/BaseProductPatchRequest"
        - type: object
          properties:
            dimensions:
              $ref: "product-schema.yaml#/components/schemas/Dimensions"
            stockQuantity:
              type: integer
              format: int32
            shippable:
              type: boolean

    DigitalProductPatchRequest:
      x-discriminator-value: DIGITAL
      allOf:
        - $ref: "#/components/schemas/BaseProductPatchRequest"
        - type: object
          properties:
            fileSize:
              type: integer
              format: int64
            fileFormat:
              type: string
            downloadUrl:
              type: string
              format: uri

    ProductPatchRequest:
      oneOf:
        - $ref: "#/components/schemas/PhysicalProductPatchRequest"
        - $ref: "#/components/schemas/DigitalProductPatchRequest"
      properties:
        productType:
          $ref: "product-schema.yaml#/components/schemas/ProductType"
      discriminator:
        propertyName: productType
        mapping:
          PHYSICAL: "#/components/schemas/PhysicalProductPatchRequest"
          DIGITAL: "#/components/schemas/DigitalProductPatchRequest"

    # --- BULK CREATE ---
    BaseProductCreateItem:
      type: object
      additionalProperties: false
      properties:
        sku:
          type: string
          minLength: 1
          maxLength: 80
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true
          maxLength: 2000
        status:
          $ref: "product-schema.yaml#/components/schemas/ProductStatus"
        price:
          $ref: "product-schema.yaml#/components/schemas/Money"
        productType:
          $ref: "product-schema.yaml#/components/schemas/ProductType"
      required: [sku, name, status, price, productType]

    PhysicalProductCreateItem:
      x-discriminator-value: PHYSICAL
      allOf:
        - $ref: "#/components/schemas/BaseProductCreateItem"
        - type: object
          properties:
            dimensions:
              $ref: "product-schema.yaml#/components/schemas/Dimensions"
            stockQuantity:
              type: integer
              format: int32
            shippable:
              type: boolean

    DigitalProductCreateItem:
      x-discriminator-value: DIGITAL
      allOf:
        - $ref: "#/components/schemas/BaseProductCreateItem"
        - type: object
          properties:
            fileSize:
              type: integer
              format: int64
            fileFormat:
              type: string
            downloadUrl:
