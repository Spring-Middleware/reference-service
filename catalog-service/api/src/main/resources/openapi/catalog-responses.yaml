components:
  responses:

    CatalogResponse:
      description: Catalog response with optional product details.
      content:
        application/json:
          schema:
            $ref: "catalog-schema.yaml#/components/schemas/Catalog"

    CatalogWithProductsResponse:
      description: Catalog response with optional product details.
      content:
        application/json:
          schema:
            $ref: "catalog-schema.yaml#/components/schemas/CatalogWithProducts"

    PagedProductResponse:
      description: Paged products in this catalog
      content:
        application/json:
          schema:
            $ref: "catalog-schema.yaml#/components/schemas/PagedProductResponse"

    PagedCatalogResponse:
      description: Paged catalogs
      content:
        application/json:
          schema:
            $ref: "catalog-schema.yaml#/components/schemas/PagedCatalogResponse"

    Error400:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "catalog-schema.yaml#/components/schemas/ErrorMessage"
    Error422:
      description: Unprocessable Entity
      content:
        application/json:
          schema:
            $ref: "catalog-schema.yaml#/components/schemas/ErrorMessage"
    Error404:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "catalog-schema.yaml#/components/schemas/ErrorMessage"
    Error409:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "catalog-schema.yaml#/components/schemas/ErrorMessage"
    Error500:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "catalog-schema.yaml#/components/schemas/ErrorMessage"
