version: '3.8'

services:
  mongo:
    image: mongo:6.0
    restart: always
    ports:
      - "27018:27017" # Expose for local access if running app outside docker too
    environment:
      MONGO_INITDB_DATABASE: catalog
    volumes:
      - mongo-data:/data/db
    networks:
      - middleware-net

  redis:
    image: redis:7-alpine
    container_name: redis_local
    ports:
      - "6379:6379"
    networks:
      middleware-net:
        aliases:
          - redis

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"     # AMQP port
      - "15672:15672"   # Management UI
    volumes:
      - ./src/test/resources/definitions.json:/etc/rabbitmq/definitions.json
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit load_definitions \"/etc/rabbitmq/definitions.json\""
    restart: always
    networks:
      - middleware-net

  registry:
    # Build context as passed by user, assuming files exist relative to execution context or built image exists
    # build:
    #   context: .
    #   dockerfile: parent/registry/boot/Dockerfile.runtime
    image: spring-base_registry:latest
    container_name: registry_local
    hostname: registry
    expose:
      - "8080"
      - "5005"
    environment:
      - JAVA_TOOL_OPTIONS=--enable-preview -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - SPRING_PROFILES_ACTIVE=LOCAL
      - REGISTRY_ENDPOINT=http://registry:8080/registry
      - REDIS_ADDRESS=redis://redis:6379
      - GRAPHQL_ENABLED=false
      - REGISTRY_CONSISTENCY_SCHEDULER_ENABLED=false
      - REGISTRY_TOPOLOGY_RECONCILER_ENABLED=true
      - REGISTRY_TOPOLOGY_RECONCILER_CRON=*/5 * * * * *
      - REGISTRY_TOPOLOGY_RECONCILER_MAX_NO_AVAIL=3
      - LOG_API_KEY=${LOG_API_KEY}
      - JMS_PASSWORD=${JMS_PASSWORD}
    networks:
      middleware-net:
        aliases:
          - registry
    depends_on:
      - redis
      - rabbitmq

  catalog-service:
    build:
      context: ./catalog-service
      dockerfile: Dockerfile
    image: catalog-service:latest
    container_name: catalog_local
    hostname: catalog
    ports:
      - "8070:8080"
      - "5008:5005"
    environment:
      - JAVA_TOOL_OPTIONS=--enable-preview -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005 -Djava.net.preferIPv4Stack=true -Dio.netty.resolver.dns.ndots=1 -Dio.netty.resolver.dns.noSearchDomains=true -Dio.netty.resolver.dns.queryTimeoutMillis=10000
      - SERVER_PORT=8080
      - REGISTRY_ENDPOINT=http://registry:8080/registry
      - SERVER_CONTEXT_PATH=/catalog
      - MONGO_URI=mongodb://mongo:27017/catalog
      - REDIS_ADDRESS=redis://redis:6379
      - SPRING_PROFILES_ACTIVE=local
      - GRAPHQL_ENABLED=false
      - REGISTRY_CONSISTENCY_SCHEDULER_ENABLED=true
      - REGISTRY_CONSISTENCY_SCHEDULER_CRON=*/10 * * * * *
      - LOG_API_KEY=${LOG_API_KEY}
      - LOG_REQUEST_ENABLED=true
      - LOG_RESPONSE_ENABLED=true
      - LOG_RESPONSE_TIME_ENABLED=false
      - SECURITY_USERNAME=admin
      - SECURITY_PASSWORD=${SECURITY_PASSWORD}
      - OIDC_ISSUER_URI=http://localhost:8081/realms/spring-middleware
      - OIDC_JWK_SET_URI=http://keycloak:8080/realms/spring-middleware/protocol/openid-connect/certs
      - OIDC_AUTHORITIES_CLAIM_PATH=$$.resource_access.catalog-service.roles[*]
      - API_KEY_CATALOG_SERVICE=${API_KEY_CATALOG_SERVICE}
      - JMS_PASSWORD=${JMS_PASSWORD}
    depends_on:
      - mongo
      - registry
      - nginx
    networks:
      - middleware-net


  nginx:
    image: nginx:latest
    hostname: product
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - product-service-1
      - product-service-2
      - product-service-3
    networks:
      middleware-net:
        aliases:
          - product

  product-service-1:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    image: product-service:latest
    hostname: product-1
    expose:
      - "8080"
      - "5005"
    environment:
      - JAVA_TOOL_OPTIONS=--enable-preview -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5007 -Djava.net.preferIPv4Stack=true -Dio.netty.resolver.dns.ndots=1 -Dio.netty.resolver.dns.noSearchDomains=true -Dio.netty.resolver.dns.queryTimeoutMillis=10000
      - SERVER_PORT=8080
      - SERVER_CONTEXT_PATH=/product
      - REGISTRY_ENDPOINT=http://registry:8080/registry
      - MONGO_URI=mongodb://mongo:27017/product
      - GRAPHQL_ENABLED=true
      - GRAPHQL_CLUSTER_NAME=product
      - GRAPHQL_NAMESPACE=product
      - SPRING_PROFILES_ACTIVE=local
      - REGISTRY_CONSISTENCY_SCHEDULER_ENABLED=true
      - REGISTRY_CONSISTENCY_SCHEDULER_CRON=*/10 * * * * *
      - LOG_API_KEY=${LOG_API_KEY}
      - LOG_REQUEST_ENABLED=true
      - LOG_RESPONSE_ENABLED=true
      - LOG_RESPONSE_TIME_ENABLED=false
      - JMS_PASSWORD=${JMS_PASSWORD}
    depends_on:
      - mongo
      - registry
    networks:
      - middleware-net

  product-service-2:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    image: product-service:latest
    hostname: product-2
    expose:
      - "8080"
      - "5005"
    environment:
      - JAVA_TOOL_OPTIONS=--enable-preview -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5007 -Djava.net.preferIPv4Stack=true -Dio.netty.resolver.dns.ndots=1 -Dio.netty.resolver.dns.noSearchDomains=true -Dio.netty.resolver.dns.queryTimeoutMillis=10000
      - SERVER_PORT=8080
      - SERVER_CONTEXT_PATH=/product
      - REGISTRY_ENDPOINT=http://registry:8080/registry
      - MONGO_URI=mongodb://mongo:27017/product
      - GRAPHQL_ENABLED=true
      - GRAPHQL_CLUSTER_NAME=product
      - GRAPHQL_NAMESPACE=product
      - SPRING_PROFILES_ACTIVE=local
      - REGISTRY_CONSISTENCY_SCHEDULER_ENABLED=true
      - REGISTRY_CONSISTENCY_SCHEDULER_CRON=*/10 * * * * *
      - LOG_API_KEY=${LOG_API_KEY}
      - LOG_REQUEST_ENABLED=true
      - LOG_RESPONSE_ENABLED=true
      - LOG_RESPONSE_TIME_ENABLED=false
      - JMS_PASSWORD=${JMS_PASSWORD}
    depends_on:
      - mongo
      - registry
    networks:
      - middleware-net

  product-service-3:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    image: product-service:latest
    hostname: product-3
    expose:
      - "8080"
      - "5005"
    environment:
      - JAVA_TOOL_OPTIONS=--enable-preview -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5007 -Djava.net.preferIPv4Stack=true -Dio.netty.resolver.dns.ndots=1 -Dio.netty.resolver.dns.noSearchDomains=true -Dio.netty.resolver.dns.queryTimeoutMillis=10000
      - SERVER_PORT=8080
      - SERVER_CONTEXT_PATH=/product
      - REGISTRY_ENDPOINT=http://registry:8080/registry
      - MONGO_URI=mongodb://mongo:27017/product
      - GRAPHQL_ENABLED=true
      - GRAPHQL_CLUSTER_NAME=product
      - GRAPHQL_NAMESPACE=product
      - SPRING_PROFILES_ACTIVE=local
      - REGISTRY_CONSISTENCY_SCHEDULER_ENABLED=true
      - REGISTRY_CONSISTENCY_SCHEDULER_CRON=*/10 * * * * *
      - LOG_API_KEY=${LOG_API_KEY}
      - LOG_REQUEST_ENABLED=true
      - LOG_RESPONSE_ENABLED=true
      - LOG_RESPONSE_TIME_ENABLED=false
      - JMS_PASSWORD=${JMS_PASSWORD}
    depends_on:
      - mongo
      - registry
    networks:
      - middleware-net

  product-service-debug:
    profiles:
      - debug
    build:
      context: ./product-service
      dockerfile: Dockerfile
    image: product-service:latest
    container_name: product_debug_local
    hostname: product-debug
    ports:
      - "8090:8080"
      - "5007:5007"
    environment:
      - JAVA_TOOL_OPTIONS=--enable-preview -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5007 -Djava.net.preferIPv4Stack=true -Dio.netty.resolver.dns.ndots=1 -Dio.netty.resolver.dns.noSearchDomains=true -Dio.netty.resolver.dns.queryTimeoutMillis=10000
      - SERVER_PORT=8080
      - SERVER_CONTEXT_PATH=/product
      - REGISTRY_ENDPOINT=http://registry:8080/registry
      - MONGO_URI=mongodb://mongo:27017/product
      - GRAPHQL_ENABLED=true
      - GRAPHQL_CLUSTER_NAME=product
      - GRAPHQL_NAMESPACE=product
      - SPRING_PROFILES_ACTIVE=local
      - REGISTRY_CONSISTENCY_SCHEDULER_ENABLED=true
      - REGISTRY_CONSISTENCY_SCHEDULER_CRON=*/10 * * * * *
      - LOG_API_KEY=${LOG_API_KEY}
      - LOG_REQUEST_ENABLED=true
      - LOG_RESPONSE_ENABLED=true
      - LOG_RESPONSE_TIME_ENABLED=false
      - JMS_PASSWORD=${JMS_PASSWORD}
    depends_on:
      - mongo
      - registry
    networks:
      - middleware-net

networks:
  middleware-net:
    driver: bridge
    name: middleware-net

volumes:
  mongo-data:
