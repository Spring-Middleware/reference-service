query {
    catalog(id: "82f0e0ad-febe-4491-964f-08ff6f9bb545") {
        id
        name
        products {
            __typename
            ... on PhysicalProduct {
                id
                name
                reviews {
                    id
                    rating
                    comment
                }
            }
            ... on DigitalProduct {
                id
                name
                reviews {
                    id
                    rating
                    comment
                }
            }
        }
    }
}
