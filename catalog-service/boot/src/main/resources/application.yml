  security:
    type: OIDC
    public-path:
      - /api-docs/**
      - /swagger-ui.html
      - /swagger-ui/**

    protected-paths:
      - enabled: true
        path: /api/*/catalogs/*/products
        methods: [ GET ]
        allowed-roles: [ LIST_PRODUCTS, ADMIN ]

      - enabled: true
        path: /api/*/catalogs/**
        methods: [ GET ]
        allowed-roles: [ GET_CATALOG, ADMIN ]

    oidc:
      issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8081/realms/spring-middleware}
      jwk-set-uri: ${OIDC_JWK_SET_URI:http://keycloak:8080/realms/spring-middleware/protocol/openid-connect/certs}
      authorities-claim-path: ${OIDC_AUTHORITIES_CLAIM_PATH:$.resource_access.catalog-service.roles[*]}

