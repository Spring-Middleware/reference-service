components:
  schemas:
    ProductStatus:
      type: string
      enum: [ACTIVE, INACTIVE, DISCONTINUED]
      example: ACTIVE

    ProductType:
      type: string
      enum: [PHYSICAL, DIGITAL]
      example: PHYSICAL

    Money:
      type: object
      additionalProperties: false
      properties:
        amount:
          type: number
          format: double
          example: 19.99
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: EUR
      required: [amount, currency]

    Dimensions:
      type: object
      additionalProperties: false
      properties:
        length:
          type: number
          format: double
          example: 30.0
        width:
          type: number
          format: double
          example: 20.0
        height:
          type: number
          format: double
          example: 10.0
      required: [length, width, height]

    # 1) Tipo base sin campos específicos
    BaseProduct:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        catalogId:
          type: string
          format: uuid
        sku:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/ProductStatus"
        price:
          $ref: "#/components/schemas/Money"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        productType:
          $ref: "#/components/schemas/ProductType"
      required:
        - id
        - catalogId
        - sku
        - name
        - status
        - price
        - createdAt
        - updatedAt
        - productType

    # 2) Subtipo físico
    PhysicalProduct:
      x-discriminator-value: PHYSICAL
      allOf:
        - $ref: "#/components/schemas/BaseProduct"
        - type: object
          properties:
            dimensions:
              $ref: "#/components/schemas/Dimensions"
            stockQuantity:
              type: integer
              format: int32
            shippable:
              type: boolean
          required: []  # aquí decides si son obligatorios

    # 3) Subtipo digital
    DigitalProduct:
      x-discriminator-value: DIGITAL
      allOf:
        - $ref: "#/components/schemas/BaseProduct"
        - type: object
          properties:
            fileSize:
              type: integer
              format: int64
            fileFormat:
              type: string
            downloadUrl:
              type: string
              format: uri
          required: []  # igual, según tu dominio

    # 4) Tipo “Product” de la API (polimórfico)
    Product:
      oneOf:
        - $ref: "#/components/schemas/PhysicalProduct"
        - $ref: "#/components/schemas/DigitalProduct"
      properties:
        productType:
          $ref: "#/components/schemas/ProductType"
      required: [productType]
      discriminator:
        propertyName: productType
        mapping:
          PHYSICAL: "#/components/schemas/PhysicalProduct"
          DIGITAL: "#/components/schemas/DigitalProduct"

    ErrorMessage:
      type: object
      additionalProperties: false
      properties:
        statusCode:
          type: integer
          format: int32
        statusMessage:
          type: string
        errorCode:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        extensions:
          type: object
          nullable: true
          additionalProperties: true
      required: [statusCode, statusMessage]
