components:
  schemas:
    ProductCreateRequest:
      type: object
      additionalProperties: false
      properties:
        sku:
          type: string
          minLength: 1
          maxLength: 80
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true
          maxLength: 2000
        status:
          $ref: "product-schema.yaml#/components/schemas/ProductStatus"
        price:
          $ref: "product-schema.yaml#/components/schemas/Money"
      required: [sku, name, price]

    ProductUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        sku:
          type: string
          minLength: 1
          maxLength: 80
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true
          maxLength: 2000
        status:
          $ref: "product-schema.yaml#/components/schemas/ProductStatus"
        price:
          $ref: "product-schema.yaml#/components/schemas/Money"
      required: [sku, name, status, price]

    ProductPatchRequest:
      type: object
      additionalProperties: false
      description: Only provided fields will be updated.
      properties:
        sku:
          type: string
          nullable: true
          minLength: 1
          maxLength: 80
        name:
          type: string
          nullable: true
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true
          maxLength: 2000
        status:
          $ref: "product-schema.yaml#/components/schemas/ProductStatus"
        price:
          $ref: "product-schema.yaml#/components/schemas/Money"

    ProductLookupRequest:
      type: object
      additionalProperties: false
      properties:
        productIds:
          type: array
          minItems: 1
          maxItems: 1000
          items: { type: string, format: uuid }
      required: [productIds]

