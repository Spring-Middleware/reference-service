query {
    catalog(id: "82f0e0ad-febe-4491-964f-08ff6f9bb545") {
        id
        name
        description
        status
        createdAt
        updatedAt
        productsByNames(name: "portable") {
            totalElements
            pageable {
                pageNumber
                pageSize
            }
            content {
                __typename
                ... on PhysicalProduct {
                    id
                    name
                    description
                    price {
                        amount
                        currency
                    }
                    catalog {
                        id
                        name
                        products {
                            __typename
                            ... on PhysicalProduct {
                                id
                                name
                            }
                            ... on DigitalProduct {
                                id
                                name
                            }
                        }
                    }
                    productType
                    shippable
                    sku
                    status
                    stockQuantity
                }
                ...on DigitalProduct{
                    id
                    name
                    description
                    price {
                        amount
                        currency
                    }
                    catalog {
                        id
                        name
                    }
                    productType
                    downloadUrl
                    fileFormat
                    fileSize
                    sku
                    status
                }
            }
        }
    }
}