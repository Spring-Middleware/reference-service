mutation {
    addDigitalProductsToCatalog(catalogId: "4ac84f87-e596-4d87-a2e0-d7f14bc43c17", inputs: [
        {
            name: "Product 1",
            description: "Description for Product 1",
            priceAmount: 19.99,
            priceCurrency: "USD",
            sku: "PROD-001",
            status: ACTIVE
            fileFormat: "pdf",
            fileSize: 1024,
            downloadUrl: "https://example.com/download/product1.pdf"
        },{
            name: "Product 2",
            description: "Description for Product 2",
            priceAmount: 29.99,
            priceCurrency: "USD",
            sku: "PROD-002",
            status: ACTIVE
            fileFormat: "epub",
            fileSize: 2048,
            downloadUrl: "https://example.com/download/product2.epub"
        }
    ]) {
        id
        name
        status
        createdAt
        updatedAt
        productIds
    }
}

