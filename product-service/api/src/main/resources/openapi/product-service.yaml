openapi: 3.0.3
x-middleware-endpoint: product
info:
  title: Product Service API
  version: 1.0.0
  description: |
    Product-service for Spring-Middleware demo.
    Internal service intended to be called ONLY by catalog-service (service-to-service).

servers:
  - url: http://localhost:8082
    description: Local

tags:
  - name: Product
    description: "Endpoints for managing products (CRUD operations)."

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
      x-middleware-client: product
      description: |
        API key authentication for service-to-service communication.
        Only catalog-service should be allowed.

    PassthroughAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Passthrough authentication for forwarded user credentials.
        For internal use only, should be validated and stripped by API gateway.

    OAuth2:
      type: oauth2
      x-middleware-client: product
      flows:
        clientCredentials:
          tokenUrl: https://auth-server.example.com/oauth/token
          scopes:
            product.read: Grants read access
            product.write: Grants write access

paths:
  /api/v1/products:
    get:
      tags: [ Product ]
      summary: List products
      operationId: listProducts
      security:
        - ApiKeyAuth: []
        - PassthroughAuth: []
        - OAuth2:
            - product.read
      parameters:
        - name: q
          in: query
          required: false
          description: Optional search query by name/sku
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: "product-schema.yaml#/components/schemas/ProductStatus"
        - name: catalogId
          in: query
          required: false
          description: Optional filter by catalogIds (for catalog-service expansions)
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: sort
          in: query
          required: false
          description: Sort expression, e.g. "createdAt,desc"
          schema:
            type: string
      responses:
        "200":
          description: Paged products
          content:
            application/json:
              schema:
                $ref: "product-responses.yaml#/components/schemas/PagedProductResponse"
        "400":
          $ref: "product-responses.yaml#/components/responses/Error400"
        "401":
          $ref: "product-responses.yaml#/components/responses/Error401"
        "403":
          $ref: "product-responses.yaml#/components/responses/Error403"
        "500":
          $ref: "product-responses.yaml#/components/responses/Error500"

    post:
      tags: [ Product ]
      summary: Create product
      operationId: createProduct
      security:
        - ApiKeyAuth: []
        - PassthroughAuth: []
        - OAuth2:
            - product.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "product-requests.yaml#/components/schemas/ProductCreateRequest"
            examples:
              create:
                value:
                  sku: "TSHIRT-BLUE-M"
                  name: "T-Shirt Blue (M)"
                  status: "ACTIVE"
                  price:
                    amount: 19.99
                    currency: "EUR"
      responses:
        "201":
          description: Created
          headers:
            Location:
              description: URL of the created resource
              schema:
                type: string
                example: /api/v1/products/123e4567-e89b-12d3-a456-426614174000
          content:
            application/json:
              schema:
                $ref: "product-schema.yaml#/components/schemas/Product"
        "400":
          $ref: "product-responses.yaml#/components/responses/Error400"
        "401":
          $ref: "product-responses.yaml#/components/responses/Error401"
        "403":
          $ref: "product-responses.yaml#/components/responses/Error403"
        "409":
          $ref: "product-responses.yaml#/components/responses/Error409"
        "500":
          $ref: "product-responses.yaml#/components/responses/Error500"

  /api/v1/products/bulk:
    post:
      tags: [ Product ]
      summary: Bulk create products
      operationId: createProducts
      security:
        - ApiKeyAuth: [ ]
        - PassthroughAuth: [ ]
        - OAuth2:
            - product.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "product-requests.yaml#/components/schemas/ProductBulkCreateRequest"
      responses:
        "201":
          $ref: "product-responses.yaml#/components/responses/ProductListResponse"
        "400":
          $ref: "product-responses.yaml#/components/responses/Error400"
        "401":
          $ref: "product-responses.yaml#/components/responses/Error401"
        "403":
          $ref: "product-responses.yaml#/components/responses/Error403"
        "500":
          $ref: "product-responses.yaml#/components/responses/Error500"

    put:
      tags: [ Product ]
      summary: Bulk replace products
      operationId: replaceProducts
      security:
        - ApiKeyAuth: [ ]
        - PassthroughAuth: [ ]
        - OAuth2:
            - product.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "product-requests.yaml#/components/schemas/ProductBulkReplaceRequest"
      responses:
        "200":
          $ref: "product-responses.yaml#/components/responses/ProductListResponse"
        "400":
          $ref: "product-responses.yaml#/components/responses/Error400"
        "403":
          $ref: "product-responses.yaml#/components/responses/Error403"
        "500":
          $ref: "product-responses.yaml#/components/responses/Error500"

    delete:
      tags: [ Product ]
      summary: Bulk delete products
      operationId: deleteProducts
      security:
        - ApiKeyAuth: [ ]
        - PassthroughAuth: [ ]
        - OAuth2:
            - product.write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "product-requests.yaml#/components/schemas/ProductBulkDeleteRequest"
      responses:
        "204":
          description: Products deleted
        "400":
          $ref: "product-responses.yaml#/components/responses/Error400"
        "403":
          $ref: "product-responses.yaml#/components/responses/Error403"
        "500":
          $ref: "product-responses.yaml#/components/responses/Error500"

  /api/v1/products/{id}:
    get:
      tags: [ Product ]
      summary: Get product by id
      operationId: getProduct
      security:
        - ApiKeyAuth: [ ]
        - PassthroughAuth: [ ]
        - OAuth2:
            - product.read
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
          example: 123e4567-e89b-12d3-a456-426614174000
      responses:
        "200":
          $ref: "product-responses.yaml#/components/responses/ProductResponse"
        "401":
          $ref: "product-responses.yaml#/components/responses/Error401"
        "403":
          $ref: "product-responses.yaml#/components/responses/Error403"
        "404":
          $ref: "product-responses.yaml#/components/responses/Error404"
        "500":
          $ref: "product-responses.yaml#/components/responses/Error500"

    put:
      tags: [ Product ]
      summary: Replace product
      operationId: replaceProduct
      security:
        - ApiKeyAuth: [ ]
        - PassthroughAuth: [ ]
        - OAuth2:
            - product.write
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "product-requests.yaml#/components/schemas/ProductUpdateRequest"
      responses:
        "200":
          $ref: "product-responses.yaml#/components/responses/ProductResponse"
        "400":
          $ref: "product-responses.yaml#/components/responses/Error400"
        "401":
          $ref: "product-responses.yaml#/components/responses/Error401"
        "403":
          $ref: "product-responses.yaml#/components/responses/Error403"
        "404":
          $ref: "product-responses.yaml#/components/responses/Error404"
        "409":
          $ref: "product-responses.yaml#/components/responses/Error409"
        "500":
          $ref: "product-responses.yaml#/components/responses/Error500"

    patch:
      tags: [ Product ]
      summary: Partially update product
      operationId: patchProduct
      security:
        - ApiKeyAuth: [ ]
        - PassthroughAuth: [ ]
        - OAuth2:
            - product.write
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "product-requests.yaml#/components/schemas/ProductPatchRequest"
      responses:
        "200":
          $ref: "product-responses.yaml#/components/responses/ProductResponse"
        "400":
          $ref: "product-responses.yaml#/components/responses/Error400"
        "401":
          $ref: "product-responses.yaml#/components/responses/Error401"
        "403":
          $ref: "product-responses.yaml#/components/responses/Error403"
        "404":
          $ref: "product-responses.yaml#/components/responses/Error404"
        "409":
          $ref: "product-responses.yaml#/components/responses/Error409"
        "500":
          $ref: "product-responses.yaml#/components/responses/Error500"

    delete:
      tags: [ Product ]
      summary: Delete product
      operationId: deleteProduct
      security:
        - ApiKeyAuth: [ ]
        - PassthroughAuth: [ ]
        - OAuth2:
            - product.write
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "product-responses.yaml#/components/responses/Error401"
        "403":
          $ref: "product-responses.yaml#/components/responses/Error403"
        "404":
          $ref: "product-responses.yaml#/components/responses/Error404"
        "500":
          $ref: "product-responses.yaml#/components/responses/Error500"
